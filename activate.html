<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Activate Account</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Poppins,sans-serif;
background:linear-gradient(135deg,#090214,#18042e,#26063d);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
color:#fff;
}

.card{
width:100%;
max-width:420px;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.08);
border-radius:25px;
padding:30px;
backdrop-filter:blur(12px);
}

h1{
font-size:30px;
margin-bottom:10px;
}

.greeting{
color:#ff89c8;
font-weight:600;
margin-bottom:20px;
}

.info{
line-height:1.7;
color:#ddd;
margin-bottom:30px;
}

.price{
background:rgba(255,255,255,.08);
padding:20px;
border-radius:18px;
text-align:center;
margin-bottom:25px;
}

.price h2{
font-size:38px;
color:#ff5ab5;
}

label{
display:block;
margin-bottom:10px;
font-weight:600;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:16px;
margin-bottom:25px;
outline:none;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:40px;
background:linear-gradient(90deg,#ff2f92,#ff5ab5);
color:#fff;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

button:hover{
opacity:.9;
}

#status{
margin-top:20px;
padding:15px;
background:rgba(255,255,255,.08);
border-radius:12px;
text-align:center;
font-weight:600;
display:none;
}

.steps{
margin-top:25px;
line-height:2;
color:#ddd;
font-size:15px;
}

</style>

</head>

<body>

<div class="card">

<h1>Activate Your Account</h1>

<p class="greeting">
Hey! 🎉
</p>

<p class="info">
Your account is almost ready.
Pay a one-time activation fee of
<strong>KSh 100</strong>
via M-PESA to unlock full access.
</p>

<div class="price">

<p>One-time Activation Fee</p>

<h2>KSh 100</h2>

</div>

<label>M-PESA Phone Number</label>

<input
type="tel"
id="phone"
placeholder="0706338937">

<button onclick="payNow()">
Pay Now
</button>

<div id="status"></div>

<div class="steps">

✅ Instant M-PESA STK Push<br>
✅ Secure SwiftWallet Payment<br>
✅ Automatic Account Activation

</div>

</div>
