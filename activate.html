<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Activate Account</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:Poppins,sans-serif;
background:linear-gradient(135deg,#090214,#18042e,#26063d);
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
padding:20px;
color:#fff;
}

.card{
width:100%;
max-width:420px;
background:rgba(255,255,255,.06);
border:1px solid rgba(255,255,255,.08);
border-radius:25px;
padding:30px;
backdrop-filter:blur(12px);
}

h1{
font-size:30px;
margin-bottom:10px;
}

.greeting{
color:#ff89c8;
font-weight:600;
margin-bottom:20px;
}

.info{
line-height:1.7;
color:#ddd;
margin-bottom:30px;
}

.price{
background:rgba(255,255,255,.08);
padding:20px;
border-radius:18px;
text-align:center;
margin-bottom:25px;
}

.price h2{
font-size:38px;
color:#ff5ab5;
}

label{
display:block;
margin-bottom:10px;
font-weight:600;
}

input{
width:100%;
padding:15px;
border:none;
border-radius:12px;
font-size:16px;
margin-bottom:25px;
outline:none;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:40px;
background:linear-gradient(90deg,#ff2f92,#ff5ab5);
color:#fff;
font-size:18px;
font-weight:700;
cursor:pointer;
transition:.3s;
}

button:hover{
opacity:.9;
}

#status{
margin-top:20px;
padding:15px;
background:rgba(255,255,255,.08);
border-radius:12px;
text-align:center;
font-weight:600;
display:none;
}

.steps{
margin-top:25px;
line-height:2;
color:#ddd;
font-size:15px;
}

</style>

</head>

<body>

<div class="card">

<h1>Activate Your Account</h1>

<p class="greeting">
Hey! 🎉
</p>

<p class="info">
Your account is almost ready.
Pay a one-time activation fee of
<strong>KSh 100</strong>
via M-PESA to unlock full access.
</p>

<div class="price">

<p>One-time Activation Fee</p>

<h2>KSh 100</h2>

</div>

<label>M-PESA Phone Number</label>

<input
type="tel"
id="phone"
placeholder="0706338937">

<button onclick="payNow()">
Pay Now
</button>

<div id="status"></div>

<div class="steps">

✅ Instant M-PESA STK Push<br>
✅ Secure SwiftWallet Payment<br>
✅ Automatic Account Activation

</div>

</div>
<script>

const backend="https://chat-and-earn-backend.onrender.com";

async function payNow(){

const phone=document.getElementById("phone").value.trim();

const status=document.getElementById("status");

if(phone===""){
status.style.display="block";
status.innerHTML="❌ Please enter your M-PESA phone number.";
return;
}

status.style.display="block";
status.innerHTML="⏳ Sending STK Push...";

try{

const response=await fetch(backend+"/stkpush",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body:JSON.stringify({
phone:phone
})

});

const data=await response.json();

if(!data.success){

status.innerHTML="❌ "+(data.message||"Unable to send STK Push.");

return;

}

status.innerHTML="📲 STK Push sent successfully.<br>Please check your phone and enter your M-PESA PIN.";

const reference=data.reference;

pollPayment(reference);

}catch(error){

console.log(error);

status.innerHTML="❌ Could not connect to the payment server.";

}

}

function pollPayment(reference){

const status=document.getElementById("status");

const interval=setInterval(async()=>{

try{

const response=await fetch(
backend+"/payment-status/"+reference
);

const result=await response.json();

if(result.success){

const payment=result.payment;

if(payment.status==="completed"){

clearInterval(interval);

status.innerHTML="✅ Payment successful.<br>Redirecting...";

setTimeout(()=>{

window.location.href="dashboard.html";

},2000);

}

if(payment.status==="failed"){

clearInterval(interval);

status.innerHTML="❌ Payment failed.";

}

if(payment.status==="cancelled"){

clearInterval(interval);

status.innerHTML="⚠️ Payment cancelled.";

}

}

}catch(err){

console.log(err);

}

},5000);

}

</script>
</body>
</html>
