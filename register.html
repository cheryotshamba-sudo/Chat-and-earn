<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Free Account</title>

<style>
body{
    margin:0;
    padding:20px;
    background:#f2f7ff;
    font-family:Arial,sans-serif;
}

.container{
    max-width:420px;
    margin:auto;
    background:white;
    padding:25px;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    color:#0b6b0b;
}

input, select{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:14px;
    background:#0b6b0b;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}
</style>

</head>

<body>

<div class="container">

<h2>Create Your Account</h2>

<input type="text" placeholder="Full Name" id="name">

<input type="tel" placeholder="Phone Number" id="phone">

<input type="number" placeholder="Age" id="age">

<select id="gender">
<option value="">Select Gender</option>
<option>Male</option>
<option>Female</option>
</select>

<select id="country">
<option>Kenya</option>
<option>Uganda</option>
<option>Tanzania</option>
<option>Other</option>
</select>

<h3>Select Interests</h3>

<label>
<input type="checkbox"> Chat with Foreigners
</label><br>

<label>
<input type="checkbox"> Language Exchange
</label><br>

<label>
<input type="checkbox"> Make Friends
</label>

<br><br>

<button onclick="continuePayment()">
Continue
</button>

</div>


<script>
function continuePayment(){

let name = document.getElementById("name").value;
let phone = document.getElementById("phone").value;

if(name == "" || phone == ""){
alert("Please fill your details");
return;
}

localStorage.setItem("name", name);
localStorage.setItem("phone", phone);

window.location.href = "activate.html";

}
</script>

</body>
</html>
