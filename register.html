<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Create Account</title>

<style>

*{
box-sizing:border-box;
}

body{

margin:0;
padding:25px 15px;
background:#120912;
font-family:Arial,sans-serif;
color:white;

}


.container{

max-width:430px;
margin:auto;

}


h1{

text-align:center;
font-size:30px;
font-weight:600;
margin:15px 0 35px;

background:linear-gradient(90deg,#ff4da6,#ffffff);
-webkit-background-clip:text;
color:transparent;

}



.card{

background:#190d18;
padding:35px 25px;
border-radius:20px;

}



label{

display:block;
margin-top:25px;
margin-bottom:10px;

font-size:17px;
font-weight:bold;
letter-spacing:.5px;

color:#cbb9ca;

}



input,select{

width:100%;
height:70px;

padding:0 22px;

background:#120912;

border:2px solid #64204c;

border-radius:14px;

color:white;

font-size:18px;

outline:none;

}



input::placeholder{

color:#817080;

}



select{

appearance:auto;

}



small{

display:block;

margin-top:12px;

font-size:16px;

line-height:1.8;

color:#b59caf;

}



.info{

margin-top:30px;

background:#15231f;

border:1px solid #1c6855;

padding:20px;

border-radius:14px;

font-size:17px;

line-height:1.8;

color:#7ff1c1;

}



button{

width:100%;

height:65px;

margin-top:30px;

border:none;

border-radius:15px;

background:#e92791;

color:white;

font-size:19px;

font-weight:bold;

cursor:pointer;

box-shadow:0 0 25px rgba(233,39,145,.6);

}



.login{

text-align:center;

margin-top:30px;

font-size:17px;

color:#bcaabc;

}



.login span{

color:#ff5aad;

}



</style>

</head>


<body>


<div class="container">


<h1>Create Account</h1>


<div class="card">



<label>FULL NAME *</label>

<input id="name" type="text" placeholder="Enter your full name">



<label>M-PESA PHONE NUMBER *</label>

<input id="phone" type="tel" placeholder="0712345678">

<small>
This number will be used for M-Pesa activation & withdrawals
</small>



<label>AGE *</label>

<input id="age" type="number" placeholder="Enter your age">



<label>GENDER *</label>

<select id="gender">

<option>Select gender</option>

<option>Male</option>

<option>Female</option>

</select>



<label>COUNTRY *</label>

<select id="country">

<option>Kenya</option>

<option>Uganda</option>

<option>Tanzania</option>

</select>



<label>PASSWORD *</label>

<input id="password" type="password" placeholder="Min 6 characters">



<label>CONFIRM PASSWORD *</label>

<input id="confirm" type="password" placeholder="Repeat password">





<div class="info">

ⓘ After registration you will be asked to pay a 
one-time activation fee of 
<b>Ksh 100 via M-Pesa</b>
to unlock your account and start chatting.

</div>




<button onclick="continuePayment()">

👤 Create Account & Continue

</button>




<div class="login">

Already have an account?

<span>Login here</span>

</div>



</div>

</div>





<script>

function continuePayment(){


let name=document.getElementById("name").value;

let phone=document.getElementById("phone").value;

let age=document.getElementById("age").value;

let gender=document.getElementById("gender").value;

let password=document.getElementById("password").value;

let confirm=document.getElementById("confirm").value;



if(name=="" || phone=="" || age=="" || password=="" || confirm==""){

alert("Please fill all fields");

return;

}



if(password.length < 6){

alert("Password must be at least 6 characters");

return;

}



if(password!==confirm){

alert("Passwords do not match");

return;

}



localStorage.setItem("name",name);

localStorage.setItem("phone",phone);

localStorage.setItem("age",age);

localStorage.setItem("gender",gender);



window.location.href="activate.html";


}


</script>



</body>
</html>
